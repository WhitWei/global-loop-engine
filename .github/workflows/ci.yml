name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy pytest
        pip install -e .
        
    - name: Lint with Ruff
      run: |
        ruff check scripts/
        
    - name: Type Check with mypy
      run: |
        mypy scripts/loop_engine.py
        
    - name: Test with pytest
      run: |
        pytest examples/test_token_bucket.py -v
        
    - name: Loop Engine Self-Verification (Sandbox)
      run: |
        # Engine tests itself in fast mode
        # It should intercept and block a dangerous mock command
        loop-engine --task "Evaluate environment safety" --mode fast
