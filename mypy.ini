[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True

[mypy-langgraph.*]
ignore_missing_imports = True

[mypy-langgraph.checkpoint.sqlite.*]
ignore_missing_imports = True

[mypy-dotenv.*]
ignore_missing_imports = True
